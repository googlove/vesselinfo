<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>База даних суден</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent: #007bff;
            --border: #333;
            --success: #28a745;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 600px;
            margin: 0 auto 30px auto;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }
        .ship-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .ship-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }
        .ship-name {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
        }
        .ship-detail {
            font-size: 14px;
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
        }
        .ship-detail strong {
            color: var(--text-muted);
            font-weight: normal;
        }
        .copy-btn {
            margin-top: 15px;
            padding: 10px;
            background-color: #3a3a3a;
            color: var(--text-main);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background-color 0.2s, color 0.2s;
            text-align: center;
        }
        .copy-btn:hover {
            background-color: #4a4a4a;
        }
        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            color: var(--text-muted);
            font-size: 18px;
            padding: 20px;
        }
    </style>
</head>
<body>

            { name: "FORTUNA", type: "Вантажне судно", country: "Коморос 🇰🇲", direction: "Вверх проти течії", location: "Траверз 3 причалу" },
            { name: "SPIRIDON II", type: "Перевізник худоби", country: "Тоґо 🇹🇬", direction: "Вверх проти течії", location: "Траверз 3 причалу" },

        const searchInput = document.getElementById('searchInput');
        const countrySelect = document.getElementById('countrySelect');
        const typeSelect = document.getElementById('typeSelect');
        const directionSelect = document.getElementById('directionSelect');
        const locationSelect = document.getElementById('locationSelect');
        const shipList = document.getElementById('shipList');

        const allCountries = [
            "Австрія 🇦🇹", "Азербайджан 🇦🇿", "Барбадос 🇧🇧", "Болгарія 🇧🇬", "Вануату 🇻🇺", 
            "Велика Британія 🇬🇧", "Гамбія 🇬🇲", "Гондурас 🇭🇳", "Гонконг 🇭🇰", "Греція 🇬🇷", 
            "Данія 🇩🇰", "Італія 🇮🇹", "Іспанія 🇪🇸", "Камерун 🇨🇲", "Кіпр 🇨🇾", "Китай 🇨🇳", 
            "Коморос 🇰🇲", "Ліберія 🇱🇷", "Ліван 🇱🇧", "Мальта 🇲🇹", "Маршаллові Острови 🇲🇭", 
            "Нідерланди 🇳🇱", "Німеччина 🇩🇪", "Норвегія 🇳🇴", "Палау 🇵🇼", "Панама 🇵🇦", 
            "Південна Корея 🇰🇷", "Португалія 🇵🇹", "Румунія 🇷🇴", "Сент-Вінсент і Ґренадіни 🇻🇨",

            "Туреччина 🇹🇷", "Україна 🇺🇦", "Федерація Сент-Крістофер і Невіс 🇰🇳", "Японія 🇯🇵"
        ];

        function populateFilters() {
            const uniqueCountries = [...new Set([...allCountries, ...ships.map(s => s.country)])].sort();
            uniqueCountries.forEach(c => countrySelect.innerHTML += `<option value="${c}">${c}</option>`);

            const types = [...new Set(ships.map(s => s.type))].sort();
            types.forEach(t => typeSelect.innerHTML += `<option value="${t}">${t}</option>`);

            const directions = [...new Set(ships.map(s => s.direction))].sort();
            directions.forEach(d => directionSelect.innerHTML += `<option value="${d}">${d}</option>`);
            
            for (let i = 1; i <= 130; i++) {
                locationSelect.innerHTML += `<option value="${i} миля">${i} миля</option>`;
            }
            for (let i = 1; i <= 60; i++) {
                locationSelect.innerHTML += `<option value="Траверз ${i} причалу">Траверз ${i} причалу</option>`;
            }
        }

        function renderShips(filteredShips) {
            shipList.innerHTML = '';
            
            if (filteredShips.length === 0) {
                shipList.innerHTML = '<div class="no-results">Суден не знайдено ❌</div>';
                return;
            }

            filteredShips.forEach(ship => {
                const card = document.createElement('div');
                card.className = 'ship-card';
                card.innerHTML = `
                    <div class="ship-name">${ship.name}</div>
                    <div class="ship-detail"><strong>Тип:</strong> <span>${ship.type}</span></div>
                    <div class="ship-detail"><strong>Країна:</strong> <span>${ship.country}</span></div>
                    <div class="ship-detail"><strong>Напрямок:</strong> <span>${ship.direction}</span></div>
                    <div class="ship-detail"><strong>Локація:</strong> <span>${ship.location}</span></div>
                `;

                // Створюємо кнопку копіювання
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.innerText = '📋 Копіювати дані';
                
                copyBtn.onclick = () => {
                    // Форматуємо текст з нового рядка
                    const textToCopy = `${ship.name}\n${ship.type}\n${ship.country}\n${ship.direction}\n${ship.location}`;
                    
                    navigator.clipboard.writeText(textToCopy).then(() => {
                        // Візуальне підтвердження
                        copyBtn.innerText = '✅ Скопійовано!';
                        copyBtn.style.backgroundColor = 'var(--success)';
                        copyBtn.style.color = 'white';
                        
                        // Повертаємо початковий вигляд через 2 секунди
                        setTimeout(() => {
                            copyBtn.innerText = '📋 Копіювати дані';
                            copyBtn.style.backgroundColor = '#3a3a3a';
                            copyBtn.style.color = 'var(--text-main)';
                        }, 2000);
                    }).catch(err => {
                        console.error('Помилка копіювання: ', err);
                        alert('Не вдалося скопіювати текст. Перевір налаштування браузера.');
                    });
                };

                card.appendChild(copyBtn);
                shipList.appendChild(card);
            });
        }

        function filterData() {
            const searchTerm = searchInput.value.toLowerCase();
            const countryFilter = countrySelect.value;
            const typeFilter = typeSelect.value;
            const directionFilter = directionSelect.value;
            const locationFilter = locationSelect.value;

            const filtered = ships.filter(ship => {
                const matchName = ship.name.toLowerCase().includes(searchTerm);
                const matchCountry = countryFilter === "" || ship.country === countryFilter;
                const matchType = typeFilter === "" || ship.type === typeFilter;
                const matchDirection = directionFilter === "" || ship.direction === directionFilter;
                const matchLocation = locationFilter === "" || ship.location === locationFilter;

                return matchName && matchCountry && matchType && matchDirection && matchLocation;
            });

            renderShips(filtered);
        }

        searchInput.addEventListener('input', filterData);
        countrySelect.addEventListener('change', filterData);
        typeSelect.addEventListener('change', filterData);
        directionSelect.addEventListener('change', filterData);
        locationSelect.addEventListener('change', filterData);

        populateFilters();
        renderShips(ships);
    </script>
